<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>郵便局公式データ抽出実証</title>
</head>
<body>
    <script>
        async function getOfficialData(keyword) {
            // 日本郵便の公式検索URL
            const targetUrl = `https://www.post.japanpost.jp/cgi-shiten_search/shiten.php?name=${encodeURIComponent(keyword)}`;
            // CORS回避プロキシ
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const json = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(json.contents, 'text/html');
                
                const finalData = [];

                // 公式HPのテーブル構造（table.data.full）を正確にスキャン
                const rows = doc.querySelectorAll('table.data.full tbody tr');

                rows.forEach(row => {
                    const nameNode = row.querySelector('td:nth-child(1) a');
                    const addressNode = row.querySelector('td:nth-child(2) small');

                    if (nameNode && addressNode) {
                        finalData.push({
                            "name": nameNode.textContent.trim(),
                            "address": addressNode.textContent.trim() // ここで「高倉町1-6-3」を取得
                        });
                    }
                });

                // --- データのみを返す ---
                if (finalData.length > 0) {
                    console.log("抽出成功（公式データ）:");
                    console.log(JSON.stringify(finalData, null, 2));
                    alert("データ抽出完了。コンソールを確認してください。");
                } else {
                    console.log("該当するデータが見つかりませんでした。");
                }

            } catch (error) {
                console.error("通信または解析エラー:", error);
            }
        }
    </script>

    <h2>日本郵便 公式HPデータ抽出検証</h2>
    <p>キーワード：<strong>都島郵便局</strong></p>
    <button onclick="getOfficialData('都島郵便局')">公式データを抽出してJSON表示</button>
</body>
</html>
