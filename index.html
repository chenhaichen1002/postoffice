<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>郵便局詳細住所スキャナー</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        .box { background: #fff; max-width: 700px; margin: auto; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #e60012; font-size: 20px; border-bottom: 2px solid #e60012; padding-bottom: 5px; }
        .input-group { display: flex; margin: 20px 0; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 4px 0 0 4px; font-size: 16px; }
        button { background: #e60012; color: #fff; border: none; padding: 0 20px; border-radius: 0 4px 4px 0; cursor: pointer; font-weight: bold; }
        #status { padding: 10px; margin-top: 10px; font-size: 14px; border-radius: 4px; display: none; }
        .err { background: #ffdce0; color: #af1928; }
        .load { background: #e2f3ff; color: #0066cc; }
        pre { background: #2d2d2d; color: #ccc; padding: 15px; border-radius: 6px; overflow-x: auto; font-size: 13px; min-height: 50px; }
    </style>
</head>
<body>

<div class="box">
    <h1>郵便局公式住所 抽出エンジン</h1>
    <div class="input-group">
        <input type="text" id="kw" value="都島郵便局">
        <button onclick="startFetch()">抽出実行</button>
    </div>
    <div id="status"></div>
    <pre id="res">[ 結果 ]</pre>
</div>

<script>
async function startFetch() {
    const kw = document.getElementById('kw').value;
    const status = document.getElementById('status');
    const resArea = document.getElementById('res');

    status.style.display = "block";
    status.className = "load";
    status.innerText = "⏳ サーバーに接続中... (1/2)";
    resArea.innerText = "処理中...";

    const target = `https://www.post.japanpost.jp/cgi-shiten_search/shiten.php?name=${encodeURIComponent(kw)}`;
    
    // 偽装プロキシURL（予備を含めて試行）
    const proxies = [
        `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`,
        `https://corsproxy.io/?${encodeURIComponent(target)}`
    ];

    for (const url of proxies) {
        try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error();
            
            const data = await resp.json();
            const html = data.contents || data; // プロキシによって構造が違うため調整

            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const rows = doc.querySelectorAll('table.data.full tbody tr');
            const list = [];

            rows.forEach(r => {
                const name = r.querySelector('td:nth-child(1) a')?.textContent.trim();
                const addr = r.querySelector('td:nth-child(2) small')?.textContent.trim();
                if (name && addr) list.push({ name, addr });
            });

            if (list.length > 0) {
                status.innerText = `✅ ${list.length}件 取得完了`;
                status.style.background = "#e6ffed";
                status.style.color = "#155724";
                resArea.innerText = JSON.stringify(list, null, 2);
                return; // 成功したので終了
            }
        } catch (e) {
            status.innerText = "⚠️ 接続を切り替えています...";
            continue;
        }
    }

    status.className = "err";
    status.innerText = "❌ 取得失敗。公式サイトのガードが固いか、通信制限中です。";
    resArea.innerText = "Failed to fetch. しばらく時間を置いてから再度お試しください。";
}
</script>

</body>
</html>
