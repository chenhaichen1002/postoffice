<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>郵便局データ抽出（高度な偽装版）</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 40px; }
        .main-card { background: #fff; max-width: 800px; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #d7000f; font-size: 24px; margin-bottom: 20px; border-left: 6px solid #d7000f; padding-left: 15px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 15px; border: 2px solid #e1e4e8; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #d7000f; outline: none; }
        button { background: #d7000f; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b0000d; transform: translateY(-1px); }
        #console { background: #1a1a1b; color: #39ff14; padding: 20px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; min-height: 150px; overflow-x: auto; white-space: pre-wrap; font-size: 14px; }
        .status-bar { margin-top: 10px; font-size: 14px; color: #586069; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>郵便局詳細データ・スキャナー</h1>
    
    <div class="input-group">
        <input type="text" id="searchKeyword" placeholder="局名（例：都島郵便局、大阪北郵便局）" value="都島郵便局">
        <button onclick="stealthFetch()">スキャン開始</button>
    </div>

    <div class="status-bar" id="statusBar">Ready.</div>
    <pre id="console">// 抽出されたJSONデータがここに表示されます</pre>
</div>

<script>
    async function stealthFetch() {
        const keyword = document.getElementById('searchKeyword').value;
        const consoleLog = document.getElementById('console');
        const statusBar = document.getElementById('statusBar');

        if (!keyword) return;

        statusBar.innerText = "偽装ヘッダーを構築中...";
        consoleLog.innerText = "Connecting to Japan Post server via stealth proxy...";

        // 検索用URL
        const targetUrl = `https://www.post.japanpost.jp/cgi-shiten_search/shiten.php?name=${encodeURIComponent(keyword)}`;
        
        /**
         * 偽装リクエストの構築
         * headersパラメーターを介して、ブラウザからのアクセスであることを主張します
         */
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}&_=${Date.now()}`;

        try {
            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            // プロキシのエラーチェック
            if (!data || !data.contents) {
                throw new Error("プロキシサーバーがブロックされました。時間を置いて試してください。");
            }

            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');
            
            const results = [];
            // 提供されたHTMLの正確なテーブル構造をターゲットにする
            const tableRows = doc.querySelectorAll('table.data.full tbody tr');

            tableRows.forEach(row => {
                const nameEl = row.querySelector('td:nth-child(1) a');
                const addressEl = row.querySelector('td:nth-child(2) small');

                if (nameEl && addressEl) {
                    results.push({
                        "name": nameEl.textContent.trim(),
                        "address": addressSmallCleansing(addressEl.textContent.trim())
                    });
                }
            });

            if (results.length > 0) {
                statusBar.innerText = `成功：${results.length}件のデータをスキャンしました。`;
                consoleLog.innerText = JSON.stringify(results, null, 4);
            } else {
                statusBar.innerText = "警告：データが空です。検索条件を変えてください。";
                consoleLog.innerText = "// 結果がありませんでした。局名が正しいか確認してください。";
            }

        } catch (error) {
            statusBar.innerText = "エラー発生。";
            consoleLog.innerText = `[ERROR] ${error.message}\n\n※プロキシの過負荷、または公式サイトのガードが強まっています。`;
        }
    }

    // 住所のクリーニング（余計な改行や空白を除去）
    function addressSmallCleansing(str) {
        return str.replace(/\s+/g, ' ').trim();
    }
</script>

</body>
</html>
