<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>郵便局データ取得実証（ブラウザ偽装版）</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #result { white-space: pre-wrap; background: #eee; padding: 10px; border-radius: 5px; margin-top: 20px; }
        .loading { color: blue; }
    </style>
</head>
<body>
    <h2>郵便局HPデータ取得シミュレーター</h2>
    <input type="text" id="keyword" value="京都郵便局">
    <button onclick="runVerification()">データ取得を実行</button>

    <div id="status"></div>
    <div id="result">ここに抽出したJSONデータが表示されます</div>

    <script>
        async function runVerification() {
            const keyword = document.getElementById('keyword').value;
            const status = document.getElementById('status');
            const resultDiv = document.getElementById('result');

            status.innerHTML = '<span class="loading">ブラウザを偽装してリクエスト中...</span>';
            
            // 日本郵便の検索URL
            const targetUrl = `https://www.post.japanpost.jp/cgi-shiten_search/shiten.php?name=${encodeURIComponent(keyword)}`;
            
            // alloriginsプロキシを使用して、ブラウザからのリクエストをエミュレート
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const json = await response.json();
                
                // HTMLとして解析
                const parser = new DOMParser();
                const doc = parser.parseFromString(json.contents, 'text/html');

                const extractedData = [];
                // 提供されたHTMLのクラス名「table.data.full」で抽出
                const rows = doc.querySelectorAll('table.data.full tbody tr');

                rows.forEach(row => {
                    const name = row.querySelector('td:nth-child(1) a')?.textContent.trim();
                    const address = row.querySelector('td:nth-child(2) small')?.textContent.trim();
                    if (name && address) {
                        extractedData.push({ name, address });
                    }
                });

                if (extractedData.length > 0) {
                    status.innerHTML = '<span style="color:green;">✅ 取得成功</span>';
                    resultDiv.textContent = JSON.stringify(extractedData, null, 2);
                    console.log("実証データ:", extractedData);
                } else {
                    status.innerHTML = '<span style="color:red;">⚠️ データが見つかりませんでした。HTML構造が変わったか、ブロックされています。</span>';
                    resultDiv.textContent = "取得失敗：HTMLの中身を確認してください";
                }

            } catch (error) {
                status.innerHTML = '<span style="color:red;">❌ 通信エラーが発生しました。</span>';
                console.error(error);
            }
        }
    </script>
</body>
</html>
